<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trishul-SNMP - Network Management & SNMP Utilities</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/theme.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/accessibility.css">
</head>
<body class="no-transition">
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Login Screen -->
    <div id="login-screen" class="d-none">
        <div class="container">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
                <div class="col-md-4">
                    <div class="card shadow-lg">
                        <div class="card-body text-center">
                            <img src="./img/trishul-icon.svg" alt="Trishul SNMP" class="mb-3" style="width: 80px;">
                            <h3 class="card-title mb-4">Trishul-SNMP</h3>
                            <form id="login-form">
                                <div class="mb-3">
                                    <input type="text" class="form-control" id="username" name="username" 
                                           placeholder="Username" required aria-label="Username">
                                    <div class="invalid-feedback"></div>
                                </div>
                                <div class="mb-3">
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Password" required aria-label="Password">
                                    <div class="invalid-feedback"></div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-sign-in-alt me-2"></i>Login
                                </button>
                            </form>
                            <div id="login-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="app-wrapper" class="d-none">
        <div class="d-flex" id="wrapper">
            <!-- Sidebar -->
            <div class="bg-dark" id="sidebar-wrapper">
                <div class="sidebar-heading text-white p-3 d-flex align-items-center justify-content-between">
                    <div>
                        <img src="./img/trishul-icon.svg" alt="Trishul" style="width: 30px;" class="me-2">
                        <span class="fw-bold">Trishul-SNMP</span>
                    </div>
                </div>
                <div class="list-group list-group-flush">
                    <a href="#/dashboard" class="list-group-item list-group-item-action" data-route="dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a href="#/simulator" class="list-group-item list-group-item-action" data-route="simulator">
                        <i class="fas fa-server me-2"></i>Simulator
                    </a>
                    <a href="#/walker" class="list-group-item list-group-item-action" data-route="walker">
                        <i class="fas fa-walking me-2"></i>Walker
                    </a>
                    <a href="#/traps" class="list-group-item list-group-item-action" data-route="traps">
                        <i class="fas fa-bell me-2"></i>Traps
                    </a>
                    <a href="#/browser" class="list-group-item list-group-item-action" data-route="browser">
                        <i class="fas fa-search me-2"></i>Browser
                    </a>
                    <a href="#/mibs" class="list-group-item list-group-item-action" data-route="mibs">
                        <i class="fas fa-database me-2"></i>MIBs
                    </a>
                    <a href="#/settings" class="list-group-item list-group-item-action" data-route="settings">
                        <i class="fas fa-cog me-2"></i>Settings
                    </a>
                </div>
            </div>

            <!-- Page Content -->
            <div id="page-content-wrapper" class="flex-fill">
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-link" id="sidebarToggle" aria-label="Toggle sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <div class="d-flex align-items-center ms-auto">
                            <!-- Theme toggle -->
                            <div id="theme-toggle-container"></div>
                            
                            <!-- Backend status -->
                            <span class="badge me-3" id="backend-status">
                                <i class="fas fa-circle"></i> <span>Connecting...</span>
                            </span>
                            
                            <!-- User dropdown -->
                            <div class="dropdown">
                                <button class="btn btn-link dropdown-toggle text-decoration-none" 
                                        type="button" id="userDropdown" data-bs-toggle="dropdown" 
                                        aria-expanded="false">
                                    <i class="fas fa-user-circle"></i>
                                    <span id="username-display">User</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                                    <li><a class="dropdown-item" href="#/settings">
                                        <i class="fas fa-cog me-2"></i>Settings
                                    </a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item" href="#" id="logout-btn">
                                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                                    </a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Main content -->
                <main id="main-content" class="container-fluid p-4">
                    <!-- Dynamic content loaded here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App entry point -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
