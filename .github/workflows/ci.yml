name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ------------------------------------------------------------------ #
  # Lint (ruff check + ruff format)
  # Fast gate — runs on a single Python version; no package install needed.
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check trishul_snmp tests

      - name: ruff format --check
        run: ruff format --check trishul_snmp tests

  # ------------------------------------------------------------------ #
  # Type-check (mypy strict)
  # ------------------------------------------------------------------ #
  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev,v3]"

      - name: mypy
        run: mypy

  # ------------------------------------------------------------------ #
  # Tests — matrix across all supported Python versions
  # ------------------------------------------------------------------ #
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev,v3]"

      - name: pytest
        run: |
          pytest \
            --tb=short \
            --cov=trishul_snmp \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=95 \
            -q

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
