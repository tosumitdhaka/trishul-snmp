name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:

  # ------------------------------------------------------------------ #
  # Run the full test suite before touching PyPI
  # ------------------------------------------------------------------ #
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,v3]"
      - run: pytest --tb=short -q

  # ------------------------------------------------------------------ #
  # Build the distribution (wheel + sdist)
  # ------------------------------------------------------------------ #
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install hatch
        run: pip install hatch

      - name: Build wheel and sdist
        run: hatch build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ------------------------------------------------------------------ #
  # Publish to PyPI via OIDC trusted publishing (no API token needed).
  # Requires a PyPI "trusted publisher" configured for this repo +
  # environment name "pypi".
  # ------------------------------------------------------------------ #
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------ #
  # Create a GitHub Release with auto-generated release notes.
  # ------------------------------------------------------------------ #
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
